services:
  - type: web
    name: my-page-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_DRIVER
        value: com.mysql.cj.jdbc.Driver
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_MAX_POOL_SIZE
        value: "5"
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        sync: false
      - key: JWT_AUDIENCE
        value: "my-page-users"
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "contact@kyo1941.com"
      - key: CORS_ALLOWED_ORIGINS
        value: https://kyo1941.com
      - key: KTOR_ENV
        value: production
